spec:
  template:
    spec:
      containers:
        - name: shipping
          image: python:3.12-slim-bookworm
          imagePullPolicy: IfNotPresent
          command:
            - python
            - /app/shipping.py
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            limits:
              memory: 64Mi
          volumeMounts:
            - name: shipping-hotfix
              mountPath: /app/shipping.py
              subPath: shipping.py
      volumes:
        - name: shipping-hotfix
          configMap:
            name: shipping-hotfix
